<div class="main-grid">

  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">🤖 外部Agent调用记录</div>
      <div style="display:flex;gap:6px;align-items:center;">
        <select id="hook-filter" onchange="refreshHookBoard()" style="padding:4px 8px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:12px;">
          <option value="">全部调用</option>
          <option value="knowledge-query-skill">knowledge-query-skill (查询KG置信度) 🔹</option>
          <option value="knowledge-learn-hook">knowledge-learn-hook (低置信度注入队列) 🪝</option>
          <option value="knowledge-bootstrap-hook">knowledge-bootstrap-hook (Session启动注入) 🪝</option>
          <option value="knowledge-gate-hook">knowledge-gate-hook (回复前双查KG) 🪝</option>
          <option value="knowledge-inject-hook">knowledge-inject-hook (搜索结果记录KG) 🪝</option>
        </select>
        <button class="btn" onclick="refreshHookBoard()">刷新</button>
      </div>
    </div>
    <div class="panel-body" id="hook-board">
      <div class="empty">加载中...</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">🤖 Agent 活动</div>
    </div>
    <div class="panel-body" id="agent-activity">
      <div class="empty">加载中...</div>
    </div>
  </div>

  <div class="panel full-width">
    <div class="panel-header">
      <div class="panel-title">📅 时间线</div>
      <button class="btn" onclick="refreshTimeline()">刷新</button>
    </div>
    <div class="panel-body" id="timeline-panel">
      <div class="empty">加载中...</div>
    </div>
  </div>

</div>
