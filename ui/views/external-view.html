<div class="main-grid">

  <div class="panel full-width">
    <div class="panel-header">
      <div class="panel-title">🪝 Bootstrap Hook 配置</div>
      <div class="panel-controls">
        <button class="btn btn-success btn-sm" onclick="saveBootstrapConfig()">💾 保存</button>
        <button class="btn btn-sm" onclick="resetBootstrapConfig()">🔄 重置默认</button>
      </div>
    </div>
    <div class="panel-body">
      <div class="bootstrap-config-grid">
        <div class="config-section">
          <div class="config-section-title">基础设置</div>
          <div class="config-row">
            <label class="config-checkbox">
              <input type="checkbox" id="bootstrap-enabled" checked>
              <span>启用 Session 启动注入</span>
            </label>
          </div>
          <div class="config-row">
            <div class="config-field">
              <label>超时时间 (ms)</label>
              <div class="slider-row">
                <input type="range" id="bootstrap-timeout" min="500" max="5000" value="1500" oninput="updateSlider('bootstrap-timeout')">
                <span class="slider-value" id="bootstrap-timeout-val">1500</span>
              </div>
            </div>
            <div class="config-field">
              <label>注入节点数</label>
              <div class="slider-row">
                <input type="range" id="bootstrap-max-nodes" min="1" max="20" value="5" oninput="updateSlider('bootstrap-max-nodes')">
                <span class="slider-value" id="bootstrap-max-nodes-val">5</span>
              </div>
            </div>
          </div>
          <div class="config-row">
            <div class="config-field">
              <label>最小质量阈值</label>
              <div class="slider-row">
                <input type="range" id="bootstrap-min-quality" min="0" max="10" value="0" step="0.5" oninput="updateSlider('bootstrap-min-quality')">
                <span class="slider-value" id="bootstrap-min-quality-val">0</span>
              </div>
            </div>
            <div class="config-field">
              <label>排序方式</label>
              <select id="bootstrap-sort-by">
                <option value="created_at">最近创建</option>
                <option value="quality">质量最高</option>
                <option value="depth">深度最高</option>
              </select>
            </div>
          </div>
        </div>

        <div class="config-section">
          <div class="config-section-title">注入内容模块</div>
          <div class="injection-sections">
            <div class="section-item">
              <div class="section-header">
                <label class="config-checkbox">
                  <input type="checkbox" id="section-kg-summary" checked onchange="toggleSectionEdit('kg-summary')">
                  <span class="section-name">📊 KG 摘要</span>
                </label>
                <button class="btn btn-sm section-edit-btn" onclick="editSectionTemplate('kg-summary')">📝 编辑</button>
              </div>
              <div class="section-desc">注入最近探索的 Top N 知识节点</div>
              <div class="section-template-edit" id="template-kg-summary" style="display:none">
                <textarea id="template-kg-summary-text" rows="3"></textarea>
                <button class="btn btn-sm" onclick="saveSectionTemplate('kg-summary')">保存模板</button>
              </div>
            </div>

            <div class="section-item">
              <div class="section-header">
                <label class="config-checkbox">
                  <input type="checkbox" id="section-cognitive-framework" checked onchange="toggleSectionEdit('cognitive-framework')">
                  <span class="section-name">🧠 Cognitive 框架</span>
                </label>
                <button class="btn btn-sm section-edit-btn" onclick="editSectionTemplate('cognitive-framework')">📝 编辑</button>
              </div>
              <div class="section-desc">4级置信度策略 (Expert→Novice)</div>
              <div class="section-template-edit" id="template-cognitive-framework" style="display:none">
                <textarea id="template-cognitive-framework-text" rows="5"></textarea>
                <button class="btn btn-sm" onclick="saveSectionTemplate('cognitive-framework')">保存模板</button>
              </div>
            </div>

            <div class="section-item">
              <div class="section-header">
                <label class="config-checkbox">
                  <input type="checkbox" id="section-skill-rules" checked onchange="toggleSectionEdit('skill-rules')">
                  <span class="section-name">⚡ Skill 触发规则</span>
                </label>
                <button class="btn btn-sm section-edit-btn" onclick="editSectionTemplate('skill-rules')">📝 编辑</button>
              </div>
              <div class="section-desc">knowledge-query 调用时机</div>
              <div class="section-template-edit" id="template-skill-rules" style="display:none">
                <textarea id="template-skill-rules-text" rows="5"></textarea>
                <button class="btn btn-sm" onclick="saveSectionTemplate('skill-rules')">保存模板</button>
              </div>
            </div>

            <div class="section-item">
              <div class="section-header">
                <label class="config-checkbox">
                  <input type="checkbox" id="section-topic-extraction" checked onchange="toggleSectionEdit('topic-extraction')">
                  <span class="section-name">🎯 Topic 提取规则</span>
                </label>
                <button class="btn btn-sm section-edit-btn" onclick="editSectionTemplate('topic-extraction')">📝 编辑</button>
              </div>
              <div class="section-desc">2-10字核心话题提取规则</div>
              <div class="section-template-edit" id="template-topic-extraction" style="display:none">
                <textarea id="template-topic-extraction-text" rows="3"></textarea>
                <button class="btn btn-sm" onclick="saveSectionTemplate('topic-extraction')">保存模板</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">📋 调用明细</div>
      <div class="panel-controls">
        <select id="hook-filter" onchange="refreshHookBoard()">
          <option value="">全部调用</option>
          <option value="knowledge-query-skill">knowledge-query-skill</option>
          <option value="knowledge-learn-hook">knowledge-learn-hook</option>
          <option value="knowledge-bootstrap-hook">knowledge-bootstrap-hook</option>
          <option value="knowledge-gate-hook">knowledge-gate-hook</option>
          <option value="knowledge-inject-hook">knowledge-inject-hook</option>
        </select>
        <button class="btn btn-sm" onclick="refreshHookBoard()">🔄</button>
      </div>
    </div>
    <div class="panel-body" id="hook-board">
      <div class="empty"><div class="empty-icon">⏳</div>加载中...</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">🤖 Agent 活动</div>
    </div>
    <div class="panel-body" id="agent-activity">
      <div class="empty"><div class="empty-icon">⏳</div>加载中...</div>
    </div>
  </div>

  <div class="panel full-width">
    <div class="panel-header">
      <div class="panel-title">📅 时间线</div>
      <button class="btn btn-sm" onclick="refreshTimeline()">🔄</button>
    </div>
    <div class="panel-body" id="timeline-panel">
      <div class="empty"><div class="empty-icon">⏳</div>加载中...</div>
    </div>
  </div>

</div>
