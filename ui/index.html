<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👁️ Curious Agent — 好奇探索器</title>
<link rel="stylesheet" href="css/base.css">
<style>
#graph-svg{width:100%;height:960px;border:1px solid var(--border);border-radius:8px;background:var(--bg);cursor:grab;display:block}
#graph-svg:active{cursor:grabbing}
.graph-node circle{transition:r .15s}
.graph-node:hover circle{filter:brightness(1.3)}
.graph-node text{font-size:11px;fill:var(--text-muted);pointer-events:none}
.graph-link{stroke-opacity:.6}
.graph-legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.graph-controls{display:flex;flex-wrap:wrap;align-items:center;gap:16px;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:10px}
.graph-controls .ctrl-group{display:flex;flex-direction:column;gap:3px;flex:1;min-width:120px}
.graph-controls .ctrl-label{font-size:11px;color:var(--text-muted);display:flex;justify-content:space-between}
.graph-controls .ctrl-label span{font-weight:600;color:var(--accent)}
.graph-controls input[type=range]{width:100%;height:4px;accent-color:var(--accent);cursor:pointer}
.graph-controls .ctrl-check{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;flex:1;min-width:90px}
.graph-controls input[type=checkbox]{accent-color:var(--accent);cursor:pointer;width:14px;height:14px}
.graph-controls .btn-reset{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:12px;flex-shrink:0}
.graph-controls .btn-reset:hover{border-color:var(--accent);color:var(--accent}
.scores-row{display:flex;gap:12px;align-items:stretch;margin-top:10px}
.score-input{display:flex;align-items:center;gap:6px;flex:1}
.score-input label{font-size:12px;color:var(--text-muted);flex-shrink:0}
.score-input input{flex:1;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;min-width:0}
.score-input input:focus{outline:none;border-color:var(--accent)}
</style>
<script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <span class="logo-icon">👁️</span>
      <span>Curious Agent</span>
      <span class="logo-sub">好奇探索器</span>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="refreshAll()">🔄 刷新</button>
      <button class="btn btn-primary" onclick="runExplore()">▶ 运行探索</button>
    </div>
  </header>

  <div class="view-tabs">
    <button class="view-tab active" data-view="list" onclick="switchView('list')">📋 列表视图</button>
    <button class="view-tab" data-view="graph" onclick="switchView('graph')">🔮 图谱视图</button>
    <button class="view-tab" data-view="internal" onclick="switchView('internal')">🧭 内部可视化</button>
    <button class="view-tab" data-view="external" onclick="switchView('external')">🪝 外部交互</button>
  </div>

  <div class="stats" id="stats">
    <div class="stat-card">
      <div class="stat-label">知识节点</div>
      <div class="stat-value" id="stat-nodes">—</div>
      <div class="stat-sub" id="stat-known">— 已知</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">待探索好奇心</div>
      <div class="stat-value" id="stat-pending">—</div>
      <div class="stat-sub">队列深度</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">探索历史</div>
      <div class="stat-value" id="stat-history">—</div>
      <div class="stat-sub" id="stat-notified">— 已通知</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">最后更新</div>
      <div class="stat-value" id="stat-last" style="font-size:14px;line-height:1.4;padding-top:6px;">—</div>
      <div class="stat-sub">探索器状态</div>
    </div>
  </div>

  <div id="list-view" class="view-container active"></div>
  <div id="graph-view" class="view-container"></div>
  <div id="internal-view" class="view-container"></div>
  <div id="external-view" class="view-container"></div>

</div>

<script src="js/base.js"></script>
<script src="js/list-view.js"></script>
<script src="js/graph-view.js"></script>
<script src="js/internal-view.js"></script>
<script src="js/external-view.js"></script>
<script>
function loadViewContent(viewName) {
  var container = document.getElementById(viewName + '-view');
  fetch('views/' + viewName + '-view.html').then(function(r) { return r.text(); }).then(function(html) {
    container.innerHTML = html;
    if (viewName === 'list') loadListView();
    if (viewName === 'graph') setTimeout(renderGraph, 100);
    if (viewName === 'internal') loadInternalView();
    if (viewName === 'external') loadExternalView();
  }).catch(function(e) {
    container.innerHTML = '<div class="empty">加载视图失败: ' + e.message + '</div>';
  });
}

function switchView(view) {
  currentView = view;
  var tabs = document.querySelectorAll('.view-tab');
  tabs.forEach(function(t) {
    var v = t.getAttribute('data-view');
    t.classList.toggle('active', v === view);
  });
  var containers = document.querySelectorAll('.view-container');
  containers.forEach(function(c) {
    var v = c.id.replace('-view', '');
    c.classList.toggle('active', v === view);
    c.style.display = v === view ? 'block' : 'none';
  });
  loadViewContent(view);
}

function loadAll() {
  loadState().then(function() {
    loadListView();
    log('📊 状态已刷新', 'ok');
  }).catch(function(e) {
    log('⚠️ 无法加载状态: ' + e.message, 'error');
  });
}

document.addEventListener('DOMContentLoaded', function() {
  loadViewContent('list');
  loadAll();
  document.getElementById('ctrl-charge') && document.getElementById('ctrl-charge').addEventListener('input', applyGraphParams);
  document.getElementById('ctrl-distance') && document.getElementById('ctrl-distance').addEventListener('input', applyGraphParams);
  document.getElementById('ctrl-strength') && document.getElementById('ctrl-strength').addEventListener('input', applyGraphParams);
});

setInterval(loadAll, 30000);
</script>

<div class="modal-overlay" id="detail-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">—</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

</body>
</html>
